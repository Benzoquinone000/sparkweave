short_description: "调用讯飞图片理解，先读懂截图、板书、示意图或实验图，再进入辅导回答。"
when_to_use: "当学习者上传非纯公式图片、课程截图、教材配图、实验现象、流程图或多模态题目，需要解释图中信息时使用。"
input_format: "image_base64 为图片 data URI 或原始 base64；prompt 为要观察、解释或检查的问题。"
guideline: "先提取图中关键对象、文字、关系和不确定点，再结合资料库、公式识别或推理工具回答；图片不清晰时明确提示局限。"
note: "图片理解是感知证据，不应替代严谨推导；最终答案要回到题干、资料证据和可验证步骤。"
phase: "perception"
