      .thin{fill:none;stroke:#111827;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
      .card{fill:#fff;stroke:#dfddd8;stroke-width:1.4}
      .ink{fill:#111827}
      .muted{fill:#78716c}
    </style>
  </defs>
