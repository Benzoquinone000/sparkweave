name: SparkWeave CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[server,langgraph]"
          python -m pip install pytest pytest-asyncio

      - name: Validate course templates
        run: python scripts/check_course_templates.py

      - name: Run focused backend tests
        run: |
          python -m pytest \
            tests/services/test_video_search.py \
            tests/ng/test_chat_graph.py \
            tests/services/test_guide_v2_external_video.py \
            tests/services/test_guide_v2.py \
            tests/api/test_guide_v2_router.py \
            -q

  frontend:
    name: Frontend build checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check design contract
        run: npm run check:design

      - name: Build
        run: npm run build
