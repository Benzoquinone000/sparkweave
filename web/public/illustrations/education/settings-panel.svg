<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" role="img" aria-labelledby="title desc">
  <title id="title">Settings panel</title>
  <desc id="desc">Provider settings, sliders, and a stable configuration panel.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-16%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#0f0f0f" flood-opacity=".08"/>
    </filter>
    <style>
      .paper{fill:#fff;stroke:#e5e3df;stroke-width:1.2}
      .soft{fill:#fbfaf8;stroke:#e5e3df;stroke-width:1.1}
      .ink{fill:#37352f}
      .line{fill:none;stroke:#37352f;stroke-width:2.1;stroke-linecap:round;stroke-linejoin:round}
    </style>
  </defs>
  <rect x="20" y="26" width="280" height="168" rx="10" fill="#f7f6f3"/>
  <g filter="url(#shadow)">
    <rect x="62" y="42" width="196" height="136" rx="10" class="paper"/>
    <rect x="82" y="64" width="84" height="9" rx="4.5" class="ink"/>
    <rect x="82" y="90" width="150" height="24" rx="8" class="soft"/>
    <rect x="82" y="124" width="150" height="24" rx="8" class="soft"/>
    <rect x="82" y="158" width="150" height="8" rx="4" fill="#ede9e4"/>
    <path d="M98 102h92M98 136h76" class="line" opacity=".38"/>
    <circle cx="190" cy="102" r="7" fill="#5645d4"/>
    <circle cx="174" cy="136" r="7" fill="#2a9d99"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="206" y="66" width="54" height="58" rx="8" fill="#fef7d6" stroke="#eadfbf"/>
    <path d="M226 86a12 12 0 1 1 0 18M226 92h24M232 82l-4 8 8 4" class="line"/>
  </g>
