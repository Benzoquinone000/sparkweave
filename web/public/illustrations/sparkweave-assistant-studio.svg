<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">SparkWeave assistant studio</title>
  <desc id="desc">A Notion-inspired learning assistant workspace with a course plan, tutor reply, evidence cards, and learning effect loop.</desc>
  <defs>
    <filter id="shadow" x="-12%" y="-16%" width="124%" height="136%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f0f0f" flood-opacity=".12"/>
    </filter>
    <pattern id="dots" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.1" fill="#37352f" opacity=".16"/>
    </pattern>
    <style>
      .paper{fill:#fff;stroke:#e5e3df;stroke-width:1.4}
      .soft{fill:#fbfaf8;stroke:#e5e3df;stroke-width:1.1}
      .ink{fill:#37352f}
      .muted{fill:#787671}
      .line{fill:none;stroke:#37352f;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}
      .dash{fill:none;stroke:#5645d4;stroke-width:2.6;stroke-linecap:round;stroke-dasharray:7 9}
    </style>
  </defs>
  <rect width="720" height="420" rx="8" fill="#f7f6f3"/>
  <rect x="34" y="42" width="76" height="48" rx="8" fill="#f9e79f"/>
  <rect x="596" y="54" width="58" height="34" rx="8" fill="#fde0ec"/>
  <rect x="576" y="318" width="84" height="34" rx="8" fill="#d9f3e1"/>
  <rect x="54" y="298" width="46" height="94" rx="12" fill="url(#dots)"/>
  <rect x="646" y="138" width="28" height="132" rx="10" fill="url(#dots)"/>

  <g filter="url(#shadow)">
    <rect x="84" y="60" width="552" height="304" rx="10" class="paper"/>
    <rect x="84" y="60" width="552" height="34" rx="10" fill="#fbfaf8" stroke="#e5e3df" stroke-width="1.4"/>
    <circle cx="106" cy="77" r="4" fill="#dd5b00"/>
    <circle cx="122" cy="77" r="4" fill="#f5d75e"/>
    <circle cx="138" cy="77" r="4" fill="#2a9d99"/>
    <rect x="512" y="72" width="84" height="8" rx="4" fill="#ede9e4"/>

    <rect x="112" y="116" width="156" height="210" rx="8" class="soft"/>
    <rect x="132" y="138" width="78" height="10" rx="5" class="ink"/>
    <rect x="132" y="162" width="104" height="7" rx="3.5" class="muted" opacity=".46"/>
    <rect x="132" y="180" width="74" height="7" rx="3.5" class="muted" opacity=".32"/>
    <rect x="132" y="214" width="112" height="46" rx="8" fill="#e6e0f5" stroke="#d4cbed"/>
    <rect x="132" y="274" width="112" height="28" rx="8" fill="#dcecfa" stroke="#c8ddea"/>
    <path d="M150 236h62M150 247h42M150 289h72" class="line" opacity=".46"/>

    <rect x="296" y="116" width="140" height="88" rx="8" fill="#fef7d6" stroke="#e8dec2"/>
    <rect x="316" y="138" width="70" height="9" rx="4.5" class="ink"/>
    <rect x="316" y="160" width="92" height="6" rx="3" class="muted" opacity=".45"/>
    <rect x="316" y="176" width="66" height="6" rx="3" class="muted" opacity=".3"/>
    <circle cx="408" cy="168" r="14" fill="#f5d75e"/>

    <rect x="466" y="116" width="132" height="88" rx="8" fill="#d9f3e1" stroke="#c5e5ce"/>
    <rect x="486" y="138" width="70" height="9" rx="4.5" class="ink"/>
    <rect x="486" y="160" width="84" height="6" rx="3" class="muted" opacity=".45"/>
    <rect x="486" y="176" width="54" height="6" rx="3" class="muted" opacity=".3"/>
    <circle cx="570" cy="168" r="14" fill="#2a9d99"/>

    <rect x="296" y="234" width="302" height="92" rx="8" class="soft"/>
