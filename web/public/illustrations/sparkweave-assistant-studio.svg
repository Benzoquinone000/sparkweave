    <rect x="318" y="296" width="92" height="6" rx="3" class="muted" opacity=".30"/>
    <rect x="480" y="258" width="92" height="42" rx="8" fill="#e6e0f5" stroke="#d4cbed"/>
    <path d="M500 278h48M500 290h34" class="line" opacity=".45"/>

    <path d="M268 238C284 238 286 176 296 176" class="dash" opacity=".64"/>
    <path d="M436 160C448 160 454 160 466 160" class="dash" opacity=".64"/>
    <path d="M532 204C532 220 532 222 532 234" class="dash" opacity=".64"/>
    <path d="M414 234C398 218 390 212 372 204" class="dash" opacity=".5"/>
  </g>

  <g opacity=".9">
    <circle cx="624" cy="106" r="7" fill="#5645d4"/>
    <circle cx="92" cy="266" r="6" fill="#0075de"/>
    <circle cx="652" cy="306" r="5" fill="#dd5b00"/>
  </g>
</svg>
