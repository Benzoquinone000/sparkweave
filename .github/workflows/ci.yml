name: SparkWeave CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[server,langgraph]"
          python -m pip install pytest pytest-asyncio

      - name: Validate course templates
        run: python scripts/check_course_templates.py

      - name: Check release safety
        run: python scripts/check_release_safety.py

      - name: Check competition readiness
        run: python scripts/check_competition_readiness.py

      - name: Run competition preflight CLI
        run: python -m sparkweave_cli competition-preflight --report dist/competition-readiness.json --summary dist/competition-readiness.md

      - name: Summarize competition readiness
        run: cat dist/competition-readiness.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload competition readiness artifacts
        uses: actions/upload-artifact@v4
        with:
          name: competition-readiness
          path: |
            dist/competition-readiness.json
            dist/competition-readiness.md
            dist/competition_package
          if-no-files-found: error

      - name: Run focused backend tests
        run: |
          python -m pytest \
            tests/cli/test_chat_cli.py \
            tests/scripts/test_check_release_safety.py \
            tests/scripts/test_check_competition_readiness.py \
            tests/scripts/test_render_competition_summary.py \
            tests/scripts/test_export_competition_package.py \
            tests/services/test_video_search.py \
            tests/ng/test_chat_graph.py \
            tests/services/test_guide_v2_external_video.py \
            tests/services/test_guide_v2.py \
            tests/api/test_guide_v2_router.py \
            -q

  frontend:
    name: Frontend build checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check design contract
        run: npm run check:design

      - name: Build
        run: npm run build
