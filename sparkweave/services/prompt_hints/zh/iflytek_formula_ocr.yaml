short_description: "调用讯飞公式识别，把题图、手写式子或截图里的公式转成可推理文本。"
when_to_use: "当学习者上传含公式、手写推导、板书截图或数学/工科题图，并且后续需要严谨解题、RAG 检索或代码验证时使用。"
input_format: "image_base64 为图片 data URI 或原始 base64；question 可传学习者原始问题，便于追踪上下文。"
guideline: "先识别公式，再结合题干、资料库和推理工具作答；识别为空或配置缺失时，不要编造公式，应提示用户换更清晰的图片或检查讯飞配置。"
note: "公式识别结果是外部 OCR 证据，需要在最终解答中与图片、题干和推导过程交叉校验。"
phase: "perception"
