short_description: "调用已发布的讯飞星辰工作流，把外部讯飞智能体流程接入当前学习任务。"
when_to_use: "当用户明确要求使用讯飞工作流、比赛演示工作流、课程资源工作流、PPT 大纲工作流或口语练习评测工作流时使用。"
input_format: "prompt 为用户请求；parameters 可传课程编号、任务编号、画像摘要等工作流参数。"
guideline: "只在用户明确需要讯飞工作流或当前流程被配置为讯飞工作流演示时使用；未配置时说明需要填写工作流密钥和 flow_id。"
note: "工作流结果来自外部讯飞平台，涉及课程资料或评分结论时仍要回到 SparkWeave 证据链校验。"
phase: "action"
