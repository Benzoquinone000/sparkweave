<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-labelledby="title desc">
  <title id="title">Agent workflow board</title>
  <desc id="desc">A Notion-inspired abstract workflow board showing multiple learning agents connected by cards and status lines.</desc>
