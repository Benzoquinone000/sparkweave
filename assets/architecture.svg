<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 760" role="img" aria-labelledby="title desc">
  <title id="title">SparkWeave System Architecture</title>
  <desc id="desc">SparkWeave multi-agent learning system architecture diagram.</desc>
  <defs>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0F766E" />
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB" />
    </marker>
    <filter id="soft-shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#111827" flood-opacity="0.08" />
    </filter>
    <style>
      .bg { fill: #F7FAFC; }
      .panel { fill: #FFFFFF; stroke: #DDE5E8; stroke-width: 1.4; filter: url(#soft-shadow); }
      .card { fill: #FFFFFF; stroke: #DDE5E8; stroke-width: 1.2; }
      .card-soft { fill: #F9FBFC; stroke: #DDE5E8; stroke-width: 1.1; }
      .title { font: 700 28px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 14px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #64748B; }
      .section { font: 700 17px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #111827; }
      .label { font: 600 15px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #111827; }
      .small { font: 500 12px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #64748B; }
      .tiny { font: 500 11px "Microsoft YaHei", "Segoe UI", Arial, sans-serif; fill: #64748B; }
      .teal { fill: #0F766E; }
      .blue { fill: #2563EB; }
      .red { fill: #E60012; }
      .line-teal { stroke: #0F766E; stroke-width: 2.4; fill: none; marker-end: url(#arrow-teal); }
      .line-blue { stroke: #2563EB; stroke-width: 2.1; fill: none; marker-end: url(#arrow-blue); }
      .line-muted { stroke: #A7B7BD; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect class="bg" width="1240" height="760" />

  <text x="620" y="50" text-anchor="middle" class="title">SparkWeave 星火织学系统架构</text>
  <text x="620" y="78" text-anchor="middle" class="subtitle">对话协调智能体驱动的个性化学习资源生成与多智能体协同平台</text>

  <rect x="52" y="118" width="226" height="510" rx="8" class="panel" />
  <text x="165" y="150" text-anchor="middle" class="section">用户入口</text>
  <rect x="82" y="178" width="166" height="66" rx="8" class="card-soft" />
  <text x="165" y="205" text-anchor="middle" class="label">学生 / 教师</text>
  <text x="165" y="226" text-anchor="middle" class="small">课程学习需求</text>

  <rect x="82" y="282" width="166" height="222" rx="8" class="card" />
  <text x="165" y="312" text-anchor="middle" class="label">Web 学习工作台</text>
  <text x="165" y="340" text-anchor="middle" class="small">Chat</text>
  <text x="165" y="365" text-anchor="middle" class="small">Knowledge</text>
  <text x="165" y="390" text-anchor="middle" class="small">Notebook</text>
  <text x="165" y="415" text-anchor="middle" class="small">Question Lab</text>
  <text x="165" y="440" text-anchor="middle" class="small">Agents</text>
  <text x="165" y="465" text-anchor="middle" class="small">Settings</text>

  <rect x="326" y="118" width="244" height="510" rx="8" class="panel" />
  <text x="448" y="150" text-anchor="middle" class="section">后端服务层</text>
  <rect x="358" y="178" width="180" height="74" rx="8" class="card" />
  <text x="448" y="207" text-anchor="middle" class="label">FastAPI 网关</text>
  <text x="448" y="230" text-anchor="middle" class="small">REST / WebSocket / SSE</text>

  <rect x="358" y="288" width="180" height="86" rx="8" class="card-soft" />
  <text x="448" y="319" text-anchor="middle" class="label">Turn Runtime</text>
  <text x="448" y="343" text-anchor="middle" class="small">事件流 / 会话 / 持久化</text>

  <rect x="358" y="414" width="180" height="90" rx="8" class="card-soft" />
  <text x="448" y="445" text-anchor="middle" class="label">服务封装</text>
  <text x="448" y="469" text-anchor="middle" class="small">LLM / Embedding / Search</text>

  <rect x="622" y="118" width="290" height="510" rx="8" class="panel" />
  <text x="767" y="150" text-anchor="middle" class="section">多智能体编排层</text>
  <rect x="657" y="180" width="220" height="78" rx="8" class="card" />
  <rect x="657" y="180" width="6" height="78" rx="3" class="red" />
  <text x="767" y="211" text-anchor="middle" class="label">对话协调智能体</text>
  <text x="767" y="235" text-anchor="middle" class="small">识别意图并唤醒能力图</text>

  <rect x="650" y="294" width="104" height="62" rx="8" class="card-soft" />
  <text x="702" y="322" text-anchor="middle" class="label">Chat</text>
  <text x="702" y="342" text-anchor="middle" class="tiny">通用答疑</text>
  <rect x="780" y="294" width="104" height="62" rx="8" class="card-soft" />
  <text x="832" y="322" text-anchor="middle" class="label">Solve</text>
  <text x="832" y="342" text-anchor="middle" class="tiny">推导求解</text>

  <rect x="650" y="384" width="104" height="62" rx="8" class="card-soft" />
  <text x="702" y="412" text-anchor="middle" class="label">Question</text>
  <text x="702" y="432" text-anchor="middle" class="tiny">交互练习</text>
  <rect x="780" y="384" width="104" height="62" rx="8" class="card-soft" />
  <text x="832" y="412" text-anchor="middle" class="label">Research</text>
  <text x="832" y="432" text-anchor="middle" class="tiny">路径规划</text>

  <rect x="650" y="474" width="104" height="62" rx="8" class="card-soft" />
  <text x="702" y="502" text-anchor="middle" class="label">Visualize</text>
  <text x="702" y="522" text-anchor="middle" class="tiny">图解可视化</text>
  <rect x="780" y="474" width="104" height="62" rx="8" class="card-soft" />
  <text x="832" y="502" text-anchor="middle" class="label">Animator</text>
  <text x="832" y="522" text-anchor="middle" class="tiny">视频讲解</text>

  <rect x="964" y="118" width="224" height="510" rx="8" class="panel" />
  <text x="1076" y="150" text-anchor="middle" class="section">数据与工具层</text>
  <rect x="994" y="178" width="164" height="70" rx="8" class="card" />
  <text x="1076" y="207" text-anchor="middle" class="label">Knowledge Base</text>
  <text x="1076" y="230" text-anchor="middle" class="small">RAG / LlamaIndex</text>

  <rect x="994" y="282" width="164" height="70" rx="8" class="card" />
  <text x="1076" y="311" text-anchor="middle" class="label">Notebook</text>
  <text x="1076" y="334" text-anchor="middle" class="small">学习记录 / 题库</text>

  <rect x="994" y="386" width="164" height="70" rx="8" class="card" />
  <text x="1076" y="415" text-anchor="middle" class="label">SparkBot</text>
  <text x="1076" y="438" text-anchor="middle" class="small">长期智能体</text>

  <rect x="994" y="490" width="164" height="70" rx="8" class="card" />
  <text x="1076" y="519" text-anchor="middle" class="label">Toolchain</text>
  <text x="1076" y="542" text-anchor="middle" class="small">Manim / FFmpeg / LaTeX</text>

  <path class="line-teal" d="M248 211 C282 211 306 211 352 211" />
  <path class="line-teal" d="M538 215 C572 215 606 215 651 215" />
  <path class="line-blue" d="M767 258 L767 284" />
  <path class="line-blue" d="M877 219 C930 219 944 213 988 213" />
  <path class="line-blue" d="M877 326 C932 326 945 317 988 317" />
  <path class="line-blue" d="M877 416 C932 416 945 421 988 421" />
  <path class="line-blue" d="M877 506 C932 506 945 525 988 525" />
  <path class="line-teal" d="M448 252 L448 282" />
  <path class="line-teal" d="M448 374 L448 408" />
  <path class="line-muted" d="M622 594 C506 682 280 666 166 506" />
  <text x="397" y="682" text-anchor="middle" class="tiny">事件流、结果产物与学习记录回写到工作台</text>

  <rect x="228" y="660" width="784" height="54" rx="8" fill="#ECFDF5" stroke="#B7E4D8" stroke-width="1.2" />
  <circle cx="262" cy="687" r="7" class="teal" />
  <text x="282" y="692" class="small">闭环：学习画像构建 → 资源生成 → 路径推荐 → 智能辅导 → 效果评估 → 动态优化</text>
</svg>
