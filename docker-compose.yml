# ============================================
# SparkWeave Docker Compose Configuration
# ============================================
# This file provides orchestration for SparkWeave services
#
# Usage:
#   Production:  docker compose up -d
#   Development: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#   Build only:  docker compose build
#
# Prerequisites:
#   1. Copy .env.example to .env and configure your API keys
#   2. Runtime settings are stored in ./data/user/settings (created automatically)
#
# Local LLM (LM Studio / Ollama / vLLM):
#   Use "host.docker.internal" instead of "localhost" for LLM_HOST / EMBEDDING_HOST.
#   See .env.example for details.
#
# Milvus:
#   docker compose up -d starts Milvus Standalone, etcd, and MinIO together.
#   The SparkWeave container connects to http://milvus:19530 by default.
# ============================================

services:
  # ============================================
  # All-in-One SparkWeave Service
  # ============================================
  sparkweave:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        # Pass backend port at build time for the Vite fallback API base
        - BACKEND_PORT=${BACKEND_PORT:-8001}
    container_name: sparkweave
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:${BACKEND_PORT:-8001}"
      - "${FRONTEND_PORT:-3782}:${FRONTEND_PORT:-3782}"

    # Load environment variables from .env file
    env_file:
      - .env

    environment:
      # LLM Configuration (Required)
      - LLM_BINDING=${LLM_BINDING:-openai}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_HOST=${LLM_HOST}
      - LLM_API_VERSION=${LLM_API_VERSION:-}
      - DISABLE_SSL_VERIFY=${DISABLE_SSL_VERIFY:-false}
      # Embedding Configuration (Required for Knowledge Base)
      - EMBEDDING_BINDING=${EMBEDDING_BINDING:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-large}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY}
      - EMBEDDING_HOST=${EMBEDDING_HOST}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-3072}
      - EMBEDDING_API_VERSION=${EMBEDDING_API_VERSION:-}
      # RAG Vector Database (Milvus Standalone in this compose stack)
      - RAG_PROVIDER=${RAG_PROVIDER:-milvus}
      - MILVUS_URI=${DOCKER_MILVUS_URI:-http://milvus:19530}
      - MILVUS_TOKEN=${MILVUS_TOKEN:-}
      - MILVUS_COLLECTION_PREFIX=${MILVUS_COLLECTION_PREFIX:-sparkweave}
      - MILVUS_SIMILARITY_METRIC=${MILVUS_SIMILARITY_METRIC:-IP}
      - MILVUS_CONSISTENCY_LEVEL=${MILVUS_CONSISTENCY_LEVEL:-Strong}
      - MILVUS_OVERWRITE_ON_INIT=${MILVUS_OVERWRITE_ON_INIT:-1}
      # Web Search Configuration (Optional)
      - SEARCH_PROVIDER=${SEARCH_PROVIDER:-}
      - SEARCH_API_KEY=${SEARCH_API_KEY:-}
      - SEARCH_BASE_URL=${SEARCH_BASE_URL:-}
      # ============================================
      # Service Ports Configuration
      # ============================================
      # Backend API port (default: 8001)
      - BACKEND_PORT=${BACKEND_PORT:-8001}
      # Frontend web port (default: 3782)
      - FRONTEND_PORT=${FRONTEND_PORT:-3782}
      # ============================================
      # API URL Configuration (Important for Remote Deployment)
      # ============================================
      # The frontend runs in the USER'S BROWSER — "localhost" means the user's machine,
      # not the Docker host. This matters when Docker runs on a remote server.
      #
      # LOCAL (browsing from the same machine running Docker):
      #   Leave blank — defaults to http://localhost:8001, which works via port mapping.
      #
      # REMOTE SERVER (Docker on a server, accessed from another machine):
      #   Set to the server's public IP or hostname, e.g.:
      #     NEXT_PUBLIC_API_BASE_EXTERNAL=http://203.0.113.10:8001
      #   Without this the browser tries localhost:8001 on the user's laptop and all
      #   API calls (including WebSocket) will fail.
      - NEXT_PUBLIC_API_BASE_EXTERNAL=${NEXT_PUBLIC_API_BASE_EXTERNAL:-}
      # Alternative: Direct API base URL (same priority as NEXT_PUBLIC_API_BASE_EXTERNAL)
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-}
      # Preferred Vite runtime API base for the new frontend
      - VITE_API_BASE=${VITE_API_BASE:-}

    volumes:
      # Mount local data directory for persistence (read-write)
      # This includes runtime settings under ./data/user/settings.
      - ./data/user:/app/data/user
      - ./data/knowledge_bases:/app/data/knowledge_bases
      - ./data/milvus:/app/data/milvus

    depends_on:
      milvus:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BACKEND_PORT:-8001}/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    networks:
      - sparkweave-network

  # ============================================
  # Milvus Standalone Stack for RAG
  # ============================================
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.25
    container_name: sparkweave-milvus-etcd
    restart: unless-stopped
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/milvus/etcd:/etcd
    command: etcd -advertise-client-urls=http://milvus-etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - sparkweave-network

  milvus-minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: sparkweave-milvus-minio
    restart: unless-stopped
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./data/milvus/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - sparkweave-network

  milvus:
    image: milvusdb/milvus:v2.6.15
    container_name: sparkweave-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./data/milvus/standalone:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "${MILVUS_PORT:-19530}:19530"
      - "${MILVUS_WEBUI_PORT:-9091}:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    networks:
      - sparkweave-network

# ============================================
# Networks
# ============================================
networks:
  sparkweave-network:
    driver: bridge

